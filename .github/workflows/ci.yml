name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
  

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aiassistantacr
  IMAGE_NAME: azure-action-assistant

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate syntax
        run: python -m compileall .

      - name: Import smoke test
        run: |
          python -c "from api import app; print(app.title)"
          python -c "from main import main; print('main import ok')"

      - name: Generate dummy data smoke test
        run: python scripts/generate_dummy_data.py --flights 5 --weather 5 --crm 5 --realtime 5 --seed 1

  push-to-acr:
    needs: build-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build image tag
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          FULL_IMAGE=${{ steps.vars.outputs.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          docker build -t $FULL_IMAGE:${{ steps.vars.outputs.SHORT_SHA }} \
                       -t $FULL_IMAGE:latest .
          docker push $FULL_IMAGE:${{ steps.vars.outputs.SHORT_SHA }}
          docker push $FULL_IMAGE:latest
