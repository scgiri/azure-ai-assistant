name: CD - Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "api.py"
      - "assistant/**"
      - "config/**"
      - "tools/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/cd-aca.yml"

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aiassistantacr
  IMAGE_NAME: azure-action-assistant

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build image tag
        id: vars
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          FULL_IMAGE=${{ steps.vars.outputs.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          docker build -t $FULL_IMAGE:${{ steps.vars.outputs.IMAGE_TAG }} .
          docker push $FULL_IMAGE:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ steps.vars.outputs.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          containerAppEnvironment: ${{ secrets.CONTAINERAPPS_ENVIRONMENT }}
          targetPort: 8000
          ingress: external
          environmentVariables: AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }} AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
